<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact / Commande personnalisée | Le Cha’Telier Créatif</title>
  <meta name="description" content="Contactez le Cha’Telier Créatif pour vos créations personnalisées faites main en France. Gnomes, box anniversaires, banderoles et pochons uniques, imaginés avec soin pour vos moments spéciaux." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #fffaf6;
      color: #3a3a3a;
      line-height: 1.7;
    }

    header {
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(135deg, #f6c1cc, #fbe6c2);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      margin-bottom: 15px;
    }

    header p {
      max-width: 700px;
      margin: 0 auto 30px;
      font-size: 1.1rem;
    }

    .cta {
      display: inline-block;
      padding: 14px 32px;
      background-color: #c96c86;
      color: #ffffff;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      transition: background-color 0.3s ease;
      margin-top: 20px;
    }

    .cta:hover {
      background-color: #b85d76;
    }

    section {
      padding: 70px 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 40px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
    }

    label {
      font-weight: 500;
      margin-bottom: 5px;
    }

    input, textarea {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d8cfc2;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      background-color: #c96c86;
      color: #ffffff;
      padding: 14px;
      border: none;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: 50%;
      align-self: center;
    }

    .submit-btn:hover {
      background-color: #b85d76;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 0.9rem;
      background-color: #f3e1d8;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Contactez-nous / Commande personnalisée</h1>
    <p>
      N’hésitez pas à nous écrire pour toute demande de création personnalisée. Nous répondrons avec plaisir et attention à chaque message.
    </p>
  </header>

  <section>
    <h2>Formulaire de contact</h2>
    <form action="mailto:tonemail@example.com" method="post" enctype="text/plain">
      <label for="name">Nom complet</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Votre message / commande personnalisée</label>
      <textarea id="message" name="message" placeholder="Décrivez votre création ou votre demande ici..." required></textarea>

      <button type="submit" class="submit-btn">Envoyer</button>
    </form>

    <a href="index.html" class="cta">Retour à l'accueil</a>
  </section>

  <footer>
    © Le Cha’Telier Créatif – Créations personnalisées faites main en France
  </footer>

</body>
</html>
